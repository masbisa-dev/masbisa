[tools]
python = "3.12"
node = "20"
pnpm = "latest"
uv = "latest"

[env]
UV_PYTHON_PREFERENCE = "only-managed"

[tasks]
"db:up" = "docker compose up -d"
"db:down" = "docker compose down"
"backend:sync" = { dir = "backend", run = "uv sync" }
"backend:migrate" = { dir = "backend", run = "uv run python manage.py migrate" }
"backend:dev" = { dir = "backend", run = "uv run python manage.py runserver 8000" }
